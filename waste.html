<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: #0b0b14;
            color: #e6e6e6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
        }

        /* Add to your admin panel CSS */
        #banned-users-list {
            margin-top: 20px;
            background: #1e1e2d;
            border-radius: 8px;
            padding: 10px;
        }

        .sub-header {
            font-weight: bold;
            margin-bottom: 10px;
            color: #e94560;
        }

        .user-item.banned {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid #2d3748;
        }

        .unban-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Password Modal */
        .password-modal {
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .password-box {
            background-color: #16213e;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .password-box h2 {
            margin-bottom: 20px;
            text-align: center;
            color: #f1f1f1;
        }

        .password-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: none;
            border-radius: 5px;
            background-color: #0f3460;
            color: white;
            font-size: 16px;
        }

        .password-submit {
            width: 100%;
            padding: 12px;
            background-color: #e94560;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: background-color 0.3s;
        }

        .password-submit:hover {
            background-color: #d13354;
        }

        /* Admin Panel */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #2d3748;
            margin-bottom: 20px;
        }

        .admin-title {
            font-size: 24px;
            font-weight: 700;
            color: #45c8e9;
        }

        .admin-sections {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .admin-section-btn {
            padding: 10px 20px;
            background-color: #0f3460;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.3s;
        }

        .admin-section-btn.active {
            background-color: #e94560;
        }

        .admin-section-btn:hover {
            background-color: #1a3a6a;
        }

        .admin-section {
            display: none;
        }

        .admin-section.active {
            display: block;
        }

        /* Chat Controls Section */
        .chat-controls {
            background-color: #101931;
            border-radius: 10px;
            padding: 20px;
        }

        .control-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background-color: #0f3460;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .control-info {
            font-weight: 500;
        }

        .toggle-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-weight: 500;
            background-color: #e74c3c;
        }

        .enable-btn {
            background-color: #2ecc71;
            color: white;
        }

        .disable-btn {
            background-color: #e74c3c;
            color: white;
        }

        /* Status Indicators */
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .status-active {
            background-color: #2ecc71;
        }

        .status-disabled {
            background-color: #e74c3c;
        }

        /* User Banning Section */
        .users-list {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            background-color: #0f3460;
            border-radius: 5px;
            padding: 10px;
        }

        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #2d3748;
        }

        .user-info {
            display: flex;
            align-items: center;
        }

        .user-name {
            font-weight: 500;
            margin-left: 10px;
        }

        .user-color {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            display: inline-block;
        }

        .ban-btn {
            padding: 5px 10px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        .unban-btn {
            padding: 5px 10px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        .search-users {
            width: 100%;
            padding: 10px;
            height: 40px;
            margin-bottom: 15px;
            border: none;
            border-radius: 5px;
            background-color: #0f3460;
            color: white;
        }

        .no-users {
            padding: 15px;
            text-align: center;
            color: #aaa;
        }

        /* Video Controls Section */
        .video-controls {
            background-color: #101931;
            border-radius: 10px;
            padding: 20px;
        }

        .video-url-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            border-radius: 5px;
            background-color: #0f3460;
            color: white;
            font-size: 16px;
        }

        .update-video-btn {
            width: 100%;
            padding: 12px;
            background-color: #45c8e9;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: background-color 0.3s;
        }

        .update-video-btn:hover {
            background-color: #3ab4d3;
        }

        .current-video {
            margin-top: 20px;
            padding: 15px;
            background-color: #0f3460;
            border-radius: 5px;
            word-break: break-all;
        }

        .current-video-label {
            font-weight: bold;
            margin-bottom: 10px;
            color: #45c8e9;
        }

        .video-url {
            color: #ccc;
        }
    </style>
    <script disable-devtool-auto="true" src="https://cdn.jsdelivr.net/npm/disable-devtool" clear-log="true" disable-select="true" disable-copy="true" disable-cut="true" disable-paste="false"></script>
</head>

<body>
    <!-- Password Modal -->
    <div id="password-modal" class="password-modal">
        <div class="password-box">
            <h2>Admin Authentication</h2>
            <input type="password" id="password-input" class="password-input" placeholder="Enter admin password">
            <button id="password-submit" class="password-submit">Enter Admin Panel</button>
        </div>
    </div>

    <!-- Admin Panel (hidden until authenticated) -->
    <div id="admin-panel" style="display: none;">
        <div class="container">
            <div class="admin-header">
                <h1 class="admin-title">Admin Panel</h1>
                <div id="connection-status">
                    <span class="status-indicator status-active"></span>
                    <span>Connected</span>
                </div>
            </div>

            <div class="admin-sections">
                <button id="chat-section-btn" class="admin-section-btn active">Chat Controls</button>
                <button id="video-section-btn" class="admin-section-btn">Video Controls</button>
            </div>

            <!-- Chat Controls Section -->
            <div id="chat-section" class="admin-section active">
                <div class="chat-controls">
                    <div class="control-card">
                        <div class="control-info">
                            <span class="status-indicator status-active" id="chat-status-indicator"></span>
                            <span id="chat-status-text">Chat is currently enabled</span>
                        </div>
                        <button id="toggle-chat-btn" class="toggle-btn disable-btn">Disable Chat</button>
                    </div>

                    <div class="control-card">
                        <div class="control-info">
                            <span>Clear all messages</span>
                        </div>
                        <button id="clear-messages-btn" class="toggle-btn">Clear Messages</button>
                    </div>

                    <!-- User Banning Section -->
                    <input type="text" id="search-users" class="search-users" placeholder="Search users...">
                    <div class="control-card">
                        <div class="control-info">
                            <span>Banned Users List</span>
                        </div>
                    </div>
                    <div id="banned-users-list"></div>
                    <div class="users-list" id="users-list">
                        <div class="no-users">Loading users...</div>
                    </div>
                </div>
            </div>

            <!-- Video Controls Section -->
            <div id="video-section" class="admin-section">
                <div class="video-controls">
                    <div class="control-card">
                        <div class="control-info">
                            <span>Update Video Source</span>
                        </div>
                    </div>
                    
                    <input type="text" id="video-url-input" class="video-url-input" placeholder="Enter new video URL (HLS .m3u8)">
                    <button id="update-video-btn" class="update-video-btn">Update Video Source</button>
                    
                    <div class="current-video">
                        <div class="current-video-label">Current Video Source:</div>
                        <div class="video-url" id="current-video-url">Loading...</div>
                    </div>
                    
                    <div class="control-card" style="margin-top: 20px;">
                        <div class="control-info">
                            <span>Force Video Restart</span>
                        </div>
                        <button id="restart-video-btn" class="toggle-btn">Restart Player</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase and Admin Script -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
